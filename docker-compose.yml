services:
  postgres:
    image: postgres:16-alpine
    container_name: revy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: revy
      POSTGRES_PASSWORD: revy
      POSTGRES_DB: revy
    ports:
      - "5432:5432"
    volumes:
      - revy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: revy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - revy_redisdata:/data

volumes:
  revy_pgdata:
  revy_redisdata:
